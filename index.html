<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empório Pet RH</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <h1>Empório Pet RH</h1>

    <div class="card">
      <h2>Login</h2>

      <input id="email" type="email" placeholder="E-mail" />
      <input id="password" type="password" placeholder="Senha" />

      <button onclick="login()">Entrar</button>

      <p id="msg"></p>
    </div>

    <div class="card hidden" id="panel">
      <h2>Painel</h2>

      <h3>Cadastrar funcionário</h3>

      <input id="full_name" type="text" placeholder="Nome completo" />
      <input id="cpf" type="text" placeholder="CPF" />
      <input id="rg" type="text" placeholder="RG" />
      <input id="role" type="text" placeholder="Cargo / Função" />
      <input id="phone" type="text" placeholder="Telefone" />
      <input id="mobile" type="text" placeholder="Celular" />
      <input id="admission_date" type="date" placeholder="Data de admissão" />
      <input id="ctps_number" type="text" placeholder="CTPS número" />
      <input id="ctps_series" type="text" placeholder="CTPS série" />
      <input id="city" type="text" placeholder="Cidade" />
      <input id="state" type="text" placeholder="UF" />

      <button onclick="saveEmployee()">Salvar funcionário</button>

      <p id="employeeMsg"></p>

      <hr style="margin: 24px 0;">

      <h3>Funcionários cadastrados</h3>

      <button onclick="loadEmployees()">Atualizar lista</button>
      <pre id="result"></pre>

      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xqikfrufphwaqmfuexvx.supabase.co";
    const SUPABASE_KEY = "sb_publishable__-5ZX8k6kNTwQH5dvZxvMA_xVCX7-Up";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");

      msg.innerText = "Entrando...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.innerText = "Erro: " + error.message;
        return;
      }

      if (data?.session) {
        msg.innerText = "Login realizado com sucesso";
        document.getElementById("panel").classList.remove("hidden");
        loadEmployees();
      } else {
        msg.innerText = "Login sem sessão retornada";
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      document.getElementById("panel").classList.add("hidden");
      document.getElementById("result").innerText = "";
      document.getElementById("msg").innerText = "Sessão encerrada";
    }

    async function saveEmployee() {
      const employeeMsg = document.getElementById("employeeMsg");

      const employee = {
        full_name: document.getElementById("full_name").value.trim(),
        cpf: document.getElementById("cpf").value.trim(),
        rg: document.getElementById("rg").value.trim(),
        role: document.getElementById("role").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        mobile: document.getElementById("mobile").value.trim(),
        admission_date: document.getElementById("admission_date").value || null,
        ctps_number: document.getElementById("ctps_number").value.trim(),
        ctps_series: document.getElementById("ctps_series").value.trim(),
        city: document.getElementById("city").value.trim(),
        state: document.getElementById("state").value.trim()
      };

      if (!employee.full_name) {
        employeeMsg.innerText = "Preencha pelo menos o nome do funcionário.";
        employeeMsg.style.color = "crimson";
        return;
      }

      employeeMsg.innerText = "Salvando...";
      employeeMsg.style.color = "black";

      const { error } = await supabaseClient
        .from("employees")
        .insert([employee]);

      if (error) {
        employeeMsg.innerText = "Erro ao salvar: " + error.message;
        employeeMsg.style.color = "crimson";
        return;
      }

      employeeMsg.innerText = "Funcionário salvo com sucesso.";
      employeeMsg.style.color = "green";

      document.getElementById("full_name").value = "";
      document.getElementById("cpf").value = "";
      document.getElementById("rg").value = "";
      document.getElementById("role").value = "";
      document.getElementById("phone").value = "";
      document.getElementById("mobile").value = "";
      document.getElementById("admission_date").value = "";
      document.getElementById("ctps_number").value = "";
      document.getElementById("ctps_series").value = "";
      document.getElementById("city").value = "";
      document.getElementById("state").value = "";

      loadEmployees();
    }

    async function loadEmployees() {
      const result = document.getElementById("result");
      result.innerText = "Carregando...";

      const { data, error } = await supabaseClient
        .from("employees")
        .select("id, full_name, cpf, role, admission_date, city, state")
        .order("created_at", { ascending: false });

      if (error) {
        result.innerText = "Erro: " + error.message;
        return;
      }

      result.innerText = JSON.stringify(data, null, 2);
    }

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();

      if (data?.session) {
        document.getElementById("panel").classList.remove("hidden");
        document.getElementById("msg").innerText = "Sessão já iniciada";
        loadEmployees();
      }
    }

    checkSession();
  </script>
</body>
</html>
