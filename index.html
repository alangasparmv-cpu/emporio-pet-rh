  <script>
    const SUPABASE_URL = "https://xqikfrufphwaqmfuexvx.supabase.co";
    const SUPABASE_KEY = "sb_publishable__-5ZX8k6kNTwQH5dvZxvMA_xVCX7-Up";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const ROLE_STORAGE_KEY = "emporio_pet_rh_roles_v2";

    function showTab(tabId, event) {
      document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      document.getElementById(tabId).classList.add("active");
      if (event) event.currentTarget.classList.add("active");
    }

    function onlyDigits(value) {
      return value.replace(/\D/g, "");
    }

    function toNullableBoolean(value) {
      if (value === "true") return true;
      if (value === "false") return false;
      return null;
    }

    function toNullableInteger(value) {
      if (value === "" || value === null || value === undefined) return null;
      const n = parseInt(value, 10);
      return Number.isNaN(n) ? null : n;
    }

    function toNullableNumber(value) {
      if (value === "" || value === null || value === undefined) return null;
      const n = parseFloat(value);
      return Number.isNaN(n) ? null : n;
    }

    function maskCPF(value) {
      value = onlyDigits(value).slice(0, 11);
      value = value.replace(/^(\d{3})(\d)/, "$1.$2");
      value = value.replace(/^(\d{3})\.(\d{3})(\d)/, "$1.$2.$3");
      value = value.replace(/\.(\d{3})(\d)/, ".$1-$2");
      return value;
    }

    function validateCPF(cpf) {
      cpf = onlyDigits(cpf);
      if (cpf.length !== 11) return false;
      if (/^(\d)\1+$/.test(cpf)) return false;

      let sum = 0;
      for (let i = 0; i < 9; i++) sum += parseInt(cpf.charAt(i)) * (10 - i);
      let firstCheck = 11 - (sum % 11);
      if (firstCheck >= 10) firstCheck = 0;
      if (firstCheck !== parseInt(cpf.charAt(9))) return false;

      sum = 0;
      for (let i = 0; i < 10; i++) sum += parseInt(cpf.charAt(i)) * (11 - i);
      let secondCheck = 11 - (sum % 11);
      if (secondCheck >= 10) secondCheck = 0;
      if (secondCheck !== parseInt(cpf.charAt(10))) return false;

      return true;
    }

    function maskPhone(value) {
      value = onlyDigits(value).slice(0, 10);
      if (value.length <= 2) return value.replace(/^(\d{0,2})/, "($1");
      if (value.length <= 6) return value.replace(/^(\d{2})(\d{0,4})/, "($1) $2");
      return value.replace(/^(\d{2})(\d{4})(\d{0,4})/, "($1) $2-$3");
    }

    function maskMobile(value) {
      value = onlyDigits(value).slice(0, 11);
      if (value.length <= 2) return value.replace(/^(\d{0,2})/, "($1");
      if (value.length <= 7) return value.replace(/^(\d{2})(\d{0,5})/, "($1) $2");
      return value.replace(/^(\d{2})(\d{5})(\d{0,4})/, "($1) $2-$3");
    }

    function maskCEP(value) {
      value = onlyDigits(value).slice(0, 8);
      return value.replace(/^(\d{5})(\d{0,3})$/, "$1-$2");
    }

    function maskRG(value) {
      value = value.toUpperCase().replace(/[^0-9X.\-]/g, "");
      return value.slice(0, 15);
    }

    function setEmployeeMessage(text, isError = false) {
      const employeeMsg = document.getElementById("employeeMsg");
      employeeMsg.innerText = text;
      employeeMsg.style.color = isError ? "crimson" : "green";
    }

    function loadRoles() {
      const roles = JSON.parse(localStorage.getItem(ROLE_STORAGE_KEY) || "[]");
      const datalist = document.getElementById("roles_list");
      datalist.innerHTML = "";
      roles.forEach(role => {
        const option = document.createElement("option");
        option.value = role;
        datalist.appendChild(option);
      });
    }

    function saveRole(role) {
      if (!role) return;
      const roles = JSON.parse(localStorage.getItem(ROLE_STORAGE_KEY) || "[]");
      if (!roles.includes(role)) {
        roles.push(role);
        roles.sort((a, b) => a.localeCompare(b, "pt-BR"));
        localStorage.setItem(ROLE_STORAGE_KEY, JSON.stringify(roles));
      }
      loadRoles();
    }

    async function fetchAddressByCEP() {
      const cep = onlyDigits(document.getElementById("zip_code").value);
      if (cep.length !== 8) return;

      try {
        const response = await fetch(`https://viacep.com.br/ws/${cep}/json/`);
        const data = await response.json();

        if (data.erro) {
          setEmployeeMessage("CEP não encontrado.", true);
          return;
        }

        document.getElementById("address").value = data.logradouro || "";
        document.getElementById("neighborhood").value = data.bairro || "";
        document.getElementById("city").value = data.localidade || "";
        document.getElementById("state").value = (data.uf || "").toUpperCase();
        setEmployeeMessage("Endereço preenchido pelo CEP.");
      } catch (error) {
        setEmployeeMessage("Erro ao buscar CEP.", true);
      }
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");

      msg.innerText = "Entrando...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.innerText = "Erro: " + error.message;
        return;
      }

      if (data?.session) {
        msg.innerText = "Login realizado com sucesso";
        document.getElementById("panel").classList.remove("hidden");
        loadEmployees();
      } else {
        msg.innerText = "Login sem sessão retornada";
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      document.getElementById("panel").classList.add("hidden");
      document.getElementById("result").innerText = "";
      document.getElementById("msg").innerText = "Sessão encerrada";
    }

    function getField(id) {
      return document.getElementById(id);
    }

    function collectEmployee() {
      return {
        full_name: getField("full_name").value.trim(),
        social_name: getField("social_name").value.trim(),
        birth_date: getField("birth_date").value || null,
        cpf: getField("cpf").value.trim(),
        rg: getField("rg").value.trim(),
        rg_issue_date: getField("rg_issue_date").value || null,
        rg_issuer: getField("rg_issuer").value.trim(),
        rg_issuer_state: getField("rg_issuer_state").value.trim().toUpperCase(),
        mother_name: getField("mother_name").value.trim(),
        father_name: getField("father_name").value.trim(),
        nationality: getField("nationality").value.trim(),
        birthplace: getField("birthplace").value.trim(),
        marital_status: getField("marital_status").value,
        education_level: getField("education_level").value,
        ethnicity: getField("ethnicity").value,
        first_job: toNullableBoolean(getField("first_job").value),
        retired: toNullableBoolean(getField("retired").value),
        disability: toNullableBoolean(getField("disability").value),
        disability_description: getField("disability_description").value.trim(),

        ctps_number: getField("ctps_number").value.trim(),
        ctps_series: getField("ctps_series").value.trim(),
        ctps_state: getField("ctps_state").value.trim().toUpperCase(),
        ctps_issue_date: getField("ctps_issue_date").value || null,
        pis_nis: getField("pis_nis").value.trim(),
        voter_title: getField("voter_title").value.trim(),
        voter_zone: getField("voter_zone").value.trim(),
        voter_section: getField("voter_section").value.trim(),
        reservist_certificate: getField("reservist_certificate").value.trim(),
        reservist_category: getField("reservist_category").value.trim(),
        cnh_number: getField("cnh_number").value.trim(),
        cnh_category: getField("cnh_category").value.trim(),
        cnh_issue_date: getField("cnh_issue_date").value || null,
        cnh_expiry_date: getField("cnh_expiry_date").value || null,
        first_license_date: getField("first_license_date").value || null,

        zip_code: getField("zip_code").value.trim(),
        address: getField("address").value.trim(),
        address_number: getField("address_number").value.trim(),
        address_complement: getField("address_complement").value.trim(),
        neighborhood: getField("neighborhood").value.trim(),
        city: getField("city").value.trim(),
        state: getField("state").value.trim().toUpperCase(),

        phone: getField("phone").value.trim(),
        mobile: getField("mobile").value.trim(),
        personal_email: getField("personal_email").value.trim(),
        contact_message_phone: getField("contact_message_phone").value.trim(),

        role: getField("role").value.trim(),
        admission_date: getField("admission_date").value || null,
        salary_amount: toNullableNumber(getField("salary_amount").value),
        salary_type: getField("salary_type").value,
        sector: getField("sector").value.trim(),
        supervisor: getField("supervisor").value.trim(),
        work_schedule: getField("work_schedule").value.trim(),
        work_shift: getField("work_shift").value.trim(),
        trial_contract: toNullableBoolean(getField("trial_contract").value),
        trial_days: toNullableInteger(getField("trial_days").value),
        extension_days: toNullableInteger(getField("extension_days").value),
        trial_end_date: getField("trial_end_date").value || null,
        transport_voucher: toNullableBoolean(getField("transport_voucher").value),
        transport_per_day: getField("transport_per_day").value.trim(),
        transport_type: getField("transport_type").value,

        dependents_count: toNullableInteger(getField("dependents_count").value),
        dependents: getField("dependents").value.trim(),

        observations: getField("observations").value.trim(),
        registration_date: getField("registration_date").value || null,
        registration_responsible: getField("registration_responsible").value.trim()
      };
    }

    function validateEmployee(employee) {
      const requiredFields = [
        ["full_name", "Nome completo"],
        ["birth_date", "Data de nascimento"],
        ["cpf", "CPF"],
        ["rg", "RG"],
        ["mother_name", "Nome da mãe"],
        ["nationality", "Nacionalidade"],
        ["birthplace", "Naturalidade"],
        ["marital_status", "Estado civil"],
        ["ctps_number", "CTPS número"],
        ["ctps_series", "CTPS série"],
        ["zip_code", "CEP"],
        ["address", "Endereço"],
        ["address_number", "Número"],
        ["neighborhood", "Bairro"],
        ["city", "Cidade"],
        ["state", "UF"],
        ["role", "Cargo / função"],
        ["admission_date", "Data de admissão"]
      ];

      for (const [key, label] of requiredFields) {
        if (!employee[key]) return `${label} é obrigatório.`;
      }

      if (!validateCPF(employee.cpf)) return "CPF inválido. Digite um CPF válido.";
      return null;
    }

    async function saveEmployee() {
      const employee = collectEmployee();
      const validationError = validateEmployee(employee);

      if (validationError) {
        setEmployeeMessage(validationError, true);
        return;
      }

      setEmployeeMessage("Salvando...", false);
      document.getElementById("employeeMsg").style.color = "black";

      const { error } = await supabaseClient
        .from("employees")
        .insert([employee]);

      if (error) {
        setEmployeeMessage("Erro ao salvar: " + error.message, true);
        return;
      }

      saveRole(employee.role);
      setEmployeeMessage("Funcionário salvo com sucesso.");
      resetForm();
      loadEmployees();
    }

    function resetForm() {
      const ids = [
        "full_name","social_name","birth_date","cpf","rg","rg_issue_date","rg_issuer","rg_issuer_state",
        "mother_name","father_name","nationality","birthplace","marital_status","education_level","ethnicity",
        "first_job","retired","disability","disability_description","ctps_number","ctps_series","ctps_state",
        "ctps_issue_date","pis_nis","voter_title","voter_zone","voter_section","reservist_certificate",
        "reservist_category","cnh_number","cnh_category","cnh_issue_date","cnh_expiry_date","first_license_date",
        "zip_code","address","address_number","address_complement","neighborhood","city","state","phone","mobile",
        "personal_email","contact_message_phone","role","admission_date","salary_amount","salary_type","sector",
        "supervisor","work_schedule","work_shift","trial_contract","trial_days","extension_days","trial_end_date",
        "transport_voucher","transport_per_day","transport_type","dependents_count","dependents","observations",
        "registration_date","registration_responsible"
      ];
      ids.forEach(id => getField(id).value = "");
      showTab("dados-pessoais");
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
      document.querySelector('.tab-btn[data-tab="dados-pessoais"]').classList.add("active");
    }

    async function loadEmployees() {
      const result = document.getElementById("result");
      result.innerText = "Carregando...";

      const { data, error } = await supabaseClient
        .from("employees")
        .select("full_name, cpf, role, admission_date, city, state")
        .order("created_at", { ascending: false });

      if (error) {
        result.innerText = "Erro: " + error.message;
        return;
      }

      result.innerText = JSON.stringify(data, null, 2);
    }

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();
      if (data?.session) {
        document.getElementById("panel").classList.remove("hidden");
        document.getElementById("msg").innerText = "Sessão já iniciada";
        loadEmployees();
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      loadRoles();

      getField("cpf").addEventListener("input", e => e.target.value = maskCPF(e.target.value));
      getField("phone").addEventListener("input", e => e.target.value = maskPhone(e.target.value));
      getField("mobile").addEventListener("input", e => e.target.value = maskMobile(e.target.value));
      getField("zip_code").addEventListener("input", e => e.target.value = maskCEP(e.target.value));
      getField("zip_code").addEventListener("blur", fetchAddressByCEP);
      getField("rg").addEventListener("input", e => e.target.value = maskRG(e.target.value));

      ["state","rg_issuer_state","ctps_state"].forEach(id => {
        getField(id).addEventListener("input", e => {
          e.target.value = e.target.value.replace(/[^a-zA-Z]/g, "").toUpperCase().slice(0, 2);
        });
      });

      checkSession();
    });
  </script>
</body>
</html>
