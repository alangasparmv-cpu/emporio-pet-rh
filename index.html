<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Empório Pet RH</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <h1>Empório Pet RH</h1>

    <div class="card">
      <h2>Login</h2>

      <input id="email" type="email" placeholder="E-mail" />
      <input id="password" type="password" placeholder="Senha" />

      <button onclick="login()">Entrar</button>

      <p id="msg"></p>
    </div>

    <div class="card hidden" id="panel">
      <h2>Painel</h2>
      <button onclick="loadEmployees()">Ver Funcionários</button>
      <pre id="result"></pre>
      <button onclick="logout()">Sair</button>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://xqikfrufphwaqmfuexvx.supabase.co";
    const SUPABASE_KEY = "sb_publishable__-5ZX8k6kNTwQH5dvZxvMA_xVCX7-Up";

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      const msg = document.getElementById("msg");

      msg.innerText = "Entrando...";

      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.innerText = "Erro: " + error.message;
        return;
      }

      if (data?.session) {
        msg.innerText = "Login realizado com sucesso";
        document.getElementById("panel").classList.remove("hidden");
      } else {
        msg.innerText = "Login sem sessão retornada";
      }
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      document.getElementById("panel").classList.add("hidden");
      document.getElementById("result").innerText = "";
      document.getElementById("msg").innerText = "Sessão encerrada";
    }

    async function loadEmployees() {
      const result = document.getElementById("result");
      result.innerText = "Carregando...";

      const { data, error } = await supabaseClient
        .from("employees")
        .select("*")
        .limit(10);

      if (error) {
        result.innerText = "Erro: " + error.message;
        return;
      }

      result.innerText = JSON.stringify(data, null, 2);
    }
  </script>
</body>
</html>
