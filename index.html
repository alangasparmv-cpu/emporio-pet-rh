
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empório Pet RH</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<div class="container">

<h1>Empório Pet RH</h1>

<div class="card">
<h2>Login</h2>
<input id="email" type="email" placeholder="E-mail">
<input id="password" type="password" placeholder="Senha">
<button onclick="login()">Entrar</button>
<p id="msg"></p>
</div>

<div class="card hidden" id="panel">

<h2>Cadastro / Edição de Funcionário</h2>

<input id="employee_id" type="hidden">

<label>Nome completo *</label>
<input id="full_name">

<label>CPF *</label>
<input id="cpf">

<label>Cargo *</label>
<input id="role">

<label>Cidade *</label>
<input id="city">

<label>UF *</label>
<input id="state">

<label>Data de admissão *</label>
<input id="admission_date" type="date">

<label>Foto do funcionário (URL da imagem)</label>
<input id="photo">

<button onclick="saveEmployee()">Salvar funcionário</button>
<p id="employeeMsg"></p>

<hr>

<h2>Funcionários cadastrados</h2>

<div id="employees_list"></div>

</div>
</div>

<script>

const SUPABASE_URL = "https://xqikfrufphwaqmfuexvx.supabase.co";
const SUPABASE_KEY = "sb_publishable__-5ZX8k6kNTwQH5dvZxvMA_xVCX7-Up";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function login(){

const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

const { data, error } = await supabaseClient.auth.signInWithPassword({
email,
password
});

if(error){
document.getElementById("msg").innerText = error.message;
return;
}

document.getElementById("panel").classList.remove("hidden");

loadEmployees();

}

function clearForm(){

document.getElementById("employee_id").value="";
document.getElementById("full_name").value="";
document.getElementById("cpf").value="";
document.getElementById("role").value="";
document.getElementById("city").value="";
document.getElementById("state").value="";
document.getElementById("admission_date").value="";
document.getElementById("photo").value="";

}

async function saveEmployee(){

const id = document.getElementById("employee_id").value;

const employee = {

full_name:document.getElementById("full_name").value,
cpf:document.getElementById("cpf").value,
role:document.getElementById("role").value,
city:document.getElementById("city").value,
state:document.getElementById("state").value,
admission_date:document.getElementById("admission_date").value,
photo:document.getElementById("photo").value

}

let response;

if(id){

response = await supabaseClient
.from("employees")
.update(employee)
.eq("id",id)

}else{

response = await supabaseClient
.from("employees")
.insert([employee])

}

if(response.error){

document.getElementById("employeeMsg").innerText=response.error.message;
return;

}

document.getElementById("employeeMsg").innerText="Salvo com sucesso";

clearForm();

loadEmployees();

}

async function loadEmployees(){

const {data,error}=await supabaseClient
.from("employees")
.select("*")
.order("created_at",{ascending:false})

if(error){

document.getElementById("employees_list").innerText=error.message;
return;

}

let html="";

data.forEach(emp=>{

html+=`
<div class="employee_card">

<img src="${emp.photo || 'https://cdn-icons-png.flaticon.com/512/149/149071.png'}">

<div class="employee_info">

<b>${emp.full_name}</b><br>
CPF: ${emp.cpf}<br>
Cargo: ${emp.role}<br>
${emp.city}/${emp.state}

</div>

<div class="employee_actions">

<button onclick="editEmployee('${emp.id}')">Editar</button>

</div>

</div>
`

})

document.getElementById("employees_list").innerHTML=html;

}

async function editEmployee(id){

const {data,error}=await supabaseClient
.from("employees")
.select("*")
.eq("id",id)
.single()

if(error) return;

document.getElementById("employee_id").value=data.id;
document.getElementById("full_name").value=data.full_name;
document.getElementById("cpf").value=data.cpf;
document.getElementById("role").value=data.role;
document.getElementById("city").value=data.city;
document.getElementById("state").value=data.state;
document.getElementById("admission_date").value=data.admission_date;
document.getElementById("photo").value=data.photo;

window.scrollTo({top:0,behavior:"smooth"});

}

</script>

</body>
</html>
